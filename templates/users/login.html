{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-3xl shadow-xl border border-gray-100">
        <div class="text-center">
            <div class="mx-auto h-12 w-12 text-blue-600 flex items-center justify-center rounded-2xl bg-blue-50">
                <i class="fas fa-lock fa-xl"></i>
            </div>
            <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">Sign in to Dashboard</h2>
            <p class="mt-2 text-center text-sm text-gray-600">Access your courier management portal</p>
        </div>
        <form class="mt-8 space-y-6" method="POST">
            {% csrf_token %}
            <div class="rounded-md shadow-sm -space-y-px">
                <div class="mb-4">
                    <label for="id_username" class="label text-sm font-medium text-gray-700">Username</label>
                    <input id="id_username" name="username" type="text" required
                        class="input input-bordered w-full rounded-xl focus:ring-blue-500 focus:border-blue-500"
                        placeholder="Enter username">
                </div>
                <div>
                    <label for="id_password" class="label text-sm font-medium text-gray-700">Password</label>
                    <input id="id_password" name="password" type="password" required
                        class="input input-bordered w-full rounded-xl focus:ring-blue-500 focus:border-blue-500"
                        placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" name="remember-me" type="checkbox"
                        class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-gray-900"> Remember me </label>
                </div>

                <div class="text-sm">
                    <a href="#" class="font-medium text-blue-600 hover:text-blue-500"> Forgot your password? </a>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-all">
                    <span class="absolute left-0 inset-y-0 flex items-center pl-3">
                        <i class="fas fa-sign-in-alt group-hover:text-blue-400"></i>
                    </span>
                    Sign in
                </button>
            </div>

            <div class="text-center mt-4">
                <p class="text-xs text-gray-400">Only authorized staff can access this section.</p>
            </div>
        </form>
    </div>
</div>
{% endblock %}
